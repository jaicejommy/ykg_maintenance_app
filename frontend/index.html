<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Maintenance Data Entry &amp; Management System — plant intranet login." />
  <title>Login — Maintenance Management System</title>
  <link rel="stylesheet" href="css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="login-shell" role="main">

  <!-- Left: dark brand panel -->
  <div class="login-brand-panel" aria-hidden="true">
    <span class="login-brand-mark">MMS</span>
    <div class="login-brand-title">Maintenance<br>Management System</div>
    <div class="login-brand-subtitle">Industrial plant maintenance data capture</div>
  </div>

  <!-- Right: form panel -->
  <div class="login-form-panel">
    <div class="login-form-box">

      <h2>Sign In</h2>
      <p>Enter your credentials to continue</p>

      <!-- Login Form — all IDs preserved for app.js -->
      <form id="login-form" novalidate autocomplete="off">

        <div class="mb-3">
          <label for="username" class="form-label">
            Username <span class="required-star" aria-hidden="true">*</span>
          </label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-control"
            placeholder="Enter your username"
            autocomplete="username"
            required
            maxlength="50"
          />
          <div id="username-error" class="field-error" role="alert"></div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">
            Password <span class="required-star" aria-hidden="true">*</span>
          </label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button
              type="button"
              id="toggle-password"
              class="password-toggle"
              aria-label="Toggle password visibility"
              title="Show/hide password"
            >Show</button>
          </div>
          <div id="password-error" class="field-error" role="alert"></div>
        </div>

        <button
          type="submit"
          id="btn-login"
          class="btn btn-primary w-100 py-2"
        >
          Login
        </button>

      </form>

      <p class="text-center mt-4 mb-0" style="font-size: var(--font-size-xs); color: var(--color-text-muted);">
        Intranet application &mdash; authorized personnel only
      </p>

    </div>
  </div>

</div>

<!-- Toast container rendered dynamically by ui.js -->
<div id="toast-container" class="toast-container" aria-live="polite"></div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/constants.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/validators.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
